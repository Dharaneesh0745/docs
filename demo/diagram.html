<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hello Diagram</title>
  <style>
    html, body { margin: 0; height: 100%; background: #fff;
      font-family: system-ui, sans-serif; color: #202124; }
    .wrap { height: 100%; display: grid; place-items: center; padding: 16px; }
    svg { width: 100%; max-width: 600px; height: auto; }
    .node { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 1.2; }
    .edge { stroke: #5f6368; stroke-width: 1.2; fill: none; marker-end: url(#a); }
    text { font-size: 13px; fill: #202124; font-family: inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 600 200">
      <defs>
        <marker id="a" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="#5f6368" />
        </marker>
      </defs>
      <rect class="node" x="40"  y="70" width="140" height="60" rx="8" />
      <text x="110" y="105" text-anchor="middle">Markdown</text>

      <rect class="node" x="230" y="70" width="140" height="60" rx="8" />
      <text x="300" y="105" text-anchor="middle">Renderer</text>

      <rect class="node" x="420" y="70" width="140" height="60" rx="8" />
      <text x="490" y="105" text-anchor="middle">Browser</text>

      <path class="edge" d="M180 100 L230 100" />
      <path class="edge" d="M370 100 L420 100" />
    </svg>
  </div>
</body>
</html>
